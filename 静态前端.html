<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>课程交流平台 - Dashboard</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      /* Color System */
      --color-primary: #0ea5e9; /* 天蓝色主题 */
      --color-bg-light: #f8f9fa;
      --color-surface: #ffffff;
      --color-border: #e5e7eb;

      --color-text-primary: #111827;
      --color-text-secondary: #6b7280;
      --color-text-tertiary: #9ca3af;

      /* Typography */
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 32px;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;

      /* Components */
      --radius-card: 6px;
    }

    /* Base & Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--color-bg-light);
      color: var(--color-text-primary);
      font-size: var(--text-base);
      font-weight: 400;
      line-height: 1.5;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    h1, h2, h3 {
      font-weight: 600;
      line-height: 1.25;
    }

    /* Layout */
    .sidebar {
      width: 240px;
      background-color: var(--color-surface);
      border-right: 1px solid var(--color-border);
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .main-content {
      flex: 1;
      padding: var(--space-8);
      overflow-y: auto;
    }

    /* Sidebar Components */
    .brand {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      color: var(--color-primary);
      font-size: var(--text-lg);
      font-weight: 600;
      padding: var(--space-2) var(--space-3);
    }

    .nav-menu {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-card);
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: var(--text-sm);
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    .nav-item:hover, .nav-item.active {
      background-color: #e0f2fe; /* 浅天蓝色悬浮态 */
      color: var(--color-primary);
    }

    .nav-item i {
      width: 16px;
      height: 16px;
    }

    /* Content Components */
    .card {
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-card);
      padding: var(--space-6);
    }

    .text-secondary {
      color: var(--color-text-secondary);
      margin-top: var(--space-2);
    }

    .page-title {
      font-size: var(--text-xl);
      margin-bottom: var(--space-6);
    }

    .card-title {
      font-size: var(--text-lg);
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <i data-lucide="layout-dashboard"></i>
      <span>EduSpace</span>
    </div>

    <nav class="nav-menu">
      <a class="nav-item active">
        <i data-lucide="book-open"></i>
        <span>课程列表</span>
      </a>
      <a class="nav-item">
        <i data-lucide="user"></i>
        <span>个人空间</span>
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <h1 class="page-title">Dashboard</h1>
    
    <div class="card">
      <h2 class="card-title">欢迎使用交流平台</h2>
      <p class="text-secondary">左侧边栏提供全局导航，右侧为主内容区。</p>
    </div>
  </main>

  <script>
    // 渲染 Lucide 图标
    lucide.createIcons();
  </script>
</body>
</html>
