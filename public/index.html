<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课搭子 - 同课程学习互助平台</title>

  <!-- Material Icons (Rounded) -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <!-- Remix Icon (品牌图标库，用于QQ/微信等社交图标) -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
  <!-- Material Web Components (MD3) -->
  <link href="https://unpkg.com/@material/web@2.3.0/dist/md.theme.css" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@material/web@2.3.0/button/filled-button.js?module"></script>
  <script type="module" src="https://unpkg.com/@material/web@2.3.0/button/outlined-button.js?module"></script>
  <script type="module" src="https://unpkg.com/@material/web@2.3.0/icon/icon.js?module"></script>
  <!-- Motion (Framer Motion family, vanilla JS) -->
  <script src="https://unpkg.com/motion@11.18.2/dist/motion.js"></script>
  <!-- markdown-it (markdown rendering) -->
  <script src="/js/markdown-it.min.js"></script>

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <span class="mi">dashboard</span>
      <span>课搭子</span>
    </div>

    <nav class="nav-menu">
      <section class="nav-section">
        <span class="nav-section-label">功能</span>
        <a class="nav-item" data-page="search">
          <span class="mi">search</span>
          <span>搜索</span>
        </a>
        <a class="nav-item" data-page="explore">
          <span class="mi">explore</span>
          <span>探索</span>
        </a>
        <a class="nav-item active" data-page="courses">
          <span class="mi">menu_book</span>
          <span>课程列表</span>
        </a>
      </section>

      <section class="nav-section">
        <span class="nav-section-label">个人</span>
        <a class="nav-item" data-page="profile">
          <span class="mi sidebar-avatar-icon" id="sidebar-avatar">person</span>
          <span>个人中心</span>
        </a>
        <a class="nav-item" data-page="my_post">
          <span class="mi">edit_note</span>
          <span>我的创作</span>
        </a>
        <a class="nav-item" data-page="notifications" id="notification-bell">
          <span class="mi">notifications</span>
          <span>通知</span>
          <span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </a>
      </section>
    </nav>
  </aside>

  <main class="main-content" id="main-content">
    <!-- Pages render here -->
  </main>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
