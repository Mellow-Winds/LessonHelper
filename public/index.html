<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <!-- 环境变量注入（.env 中公开的 Key） -->
  <script src="/env.js"></script>

  <!-- 预连接 CDN，减少 DNS + TLS 握手时间 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">

  <!-- 关键路径内联 CSS：确保首屏立即有正确布局和背景色 -->
  <style>
    :root{--md-primary:#4A90D9;--md-on-primary:#fff;--md-primary-container:#D3E4FD;--md-on-primary-container:#001C3B;--md-primary-hover:#3A7CC4;--md-surface:#F9F9FF;--md-on-surface:#1A1B21;--md-surface-variant:#E0E2EC;--md-on-surface-variant:#44474F;--md-outline:#74777F;--md-outline-variant:#C4C6D0;--md-surface-container-lowest:#fff;--md-surface-container-low:#F3F3FA;--md-surface-container:#EDEDF4;--md-surface-container-high:#E8E8EF;--md-surface-container-highest:#E2E2E9;--text-xs:11px;--text-sm:14px;--text-base:16px;--text-lg:20px;--text-xl:24px;--text-2xl:32px;--space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;--radius-sm:12px;--radius-md:16px;--radius-lg:20px;--radius-xl:24px;--radius-2xl:28px;--radius-pill:999px;--shadow-1:0 1px 2px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.06);--shadow-2:0 2px 4px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);--shadow-3:0 4px 8px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.08);--ease-standard:cubic-bezier(.2,0,0,1);--ease-decelerate:cubic-bezier(0,0,0,1);--ease-accelerate:cubic-bezier(.3,0,1,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);--dur-fast:120ms;--dur-normal:250ms;--dur-smooth:350ms;--dur-slow:500ms;--dur-xslow:650ms}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{--md-field-bg:var(--md-surface);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background-color:var(--md-surface);color:var(--md-on-surface);font-size:var(--text-base);font-weight:400;line-height:1.5;display:flex}
    :not(:defined){opacity:0;transition:opacity .2s ease-in-out}
    .sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,var(--md-surface-container-low) 0%,var(--md-surface) 100%);border-right:1px solid var(--md-outline-variant);padding:var(--space-4);display:flex;flex-direction:column;gap:var(--space-6)}
    .main-content{flex:1;padding:var(--space-8);overflow-y:auto;overflow-x:hidden;position:relative}
    .brand{display:flex;align-items:center;gap:var(--space-3);color:var(--md-primary);font-size:var(--text-lg);font-weight:700;padding:var(--space-4) var(--space-4);letter-spacing:-.01em}
    .nav-menu{display:flex;flex-direction:column;gap:4px;flex:1}
    .nav-item{display:flex;align-items:center;gap:var(--space-3);padding:12px 16px;border-radius:var(--radius-pill);color:var(--md-on-surface-variant);font-size:var(--text-sm);font-weight:500;text-decoration:none;cursor:pointer;transition:background-color var(--dur-normal) var(--ease-standard),color var(--dur-normal) var(--ease-standard)}
    .nav-item.active{background-color:var(--md-primary-container);color:var(--md-on-primary-container);font-weight:600;box-shadow:var(--shadow-1)}
    .bottom-tab-bar{display:none}
  </style>
